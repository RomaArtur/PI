<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - PI Gestão</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">
</head>
<body class="dashboard-body">
    <dashboard-sidebar id="dashboard-sidebar-shell"></dashboard-sidebar>
    <button
        type="button"
        id="dashboard-sidebar-overlay"
        class="dashboard-sidebar-overlay"
        aria-label="Fechar menu lateral"
    ></button>

    <main class="main-content page-shell">
        <header class="content-header">
            <div class="content-header-main">
                <button
                    type="button"
                    id="dashboard-sidebar-toggle"
                    class="dashboard-menu-toggle icon-button"
                    aria-expanded="false"
                    aria-label="Abrir menu lateral"
                >
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="content-header-copy">
                    <h2 id="welcome-msg">Bem-vindo</h2>
                    <span id="user-email" class="text-muted"></span>
                </div>
            </div>
        </header>

        <section id="section-leads" class="content-section">
            <div class="section-header">
                <h3>Gestão de Leads</h3>
                <button class="btn-add" id="btn-add-lead">+ Novo Lead</button>
            </div>
            <div class="toolbar">
                <input type="text" id="search-leads" placeholder="Buscar por nome, e-mail ou WhatsApp...">
            </div>
            <div class="card table-container">
                <table id="table-leads">
                    <thead>
                        <tr>
                            <th data-sort="nome">Nome <span class="sort-icon"></span></th>
                            <th data-sort="whatsapp">WhatsApp <span class="sort-icon"></span></th>
                            <th data-sort="email">E-mail <span class="sort-icon"></span></th>
                            <th>Interesses</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-leads"></tbody>
                </table>
            </div>
            <div class="pagination">
                <button id="prev-leads" class="btn-action">Anterior</button>
                <span id="info-leads">Página 1</span>
                <button id="next-leads" class="btn-action">Próxima</button>
            </div>
        </section>

        <section id="section-produtos" class="content-section" hidden>
            <div class="section-header">
                <h3>Catálogo de Produtos</h3>
                <button class="btn-add" id="btn-add-produto">+ Novo Produto</button>
            </div>
            <div class="toolbar">
                <input type="text" id="search-produtos" placeholder="Buscar produto...">
            </div>
            <div class="card table-container">
                <table id="table-produtos">
                    <thead>
                        <tr>
                            <th data-sort="nome">Nome <span class="sort-icon"></span></th>
                            <th data-sort="precoBase">Preço <span class="sort-icon"></span></th>
                            <th data-sort="prazoProducaoDias">Prazo <span class="sort-icon"></span></th>
                            <th data-sort="ativo">Status <span class="sort-icon"></span></th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-produtos"></tbody>
                </table>
            </div>
            <div class="pagination">
                <button id="prev-produtos" class="btn-action">Anterior</button>
                <span id="info-produtos">Página 1</span>
                <button id="next-produtos" class="btn-action">Próxima</button>
            </div>
        </section>
    </main>

    <dialog id="modal-novo-lead" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="modal-title-lead">Novo Lead</h3>
                <button
                    type="button"
                    class="btn-close"
                    data-dialog-close="#modal-novo-lead"
                >&times;</button>
            </header>
            <lead-form id="component-lead-form"></lead-form>
        </div>
    </dialog>

    <dialog id="modal-produto" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="modal-title-produto">Novo Produto</h3>
                <button
                    type="button"
                    class="btn-close"
                    data-dialog-close="#modal-produto"
                >&times;</button>
            </header>
            <produto-form id="component-produto-form"></produto-form>
        </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
    <script type="module" src="js/components/DashboardSidebar.js"></script>
    <script type="module" src="js/components/LeadForm.js"></script>
    <script type="module" src="js/components/ProdutoForm.js"></script>
    <script type="module" src="js/pages/dashboard.js"></script>
</body>
</html>
