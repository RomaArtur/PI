<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - PI Gestão</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-body">
    <dashboard-sidebar></dashboard-sidebar>

    <main class="main-content">
        <header class="content-header">
            <h2 id="welcome-msg">Bem-vindo, Lojista</h2>
            <div class="header-actions">
                <span id="user-email" class="text-muted text-sm"></span>
            </div>
        </header>

        <section id="section-leads" class="content-section">
            <div class="section-header">
                <h3>Gestão de Leads</h3>
            </div>
            <div class="card table-container">
                <table id="table-leads">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>WhatsApp</th>
                            <th>E-mail</th>
                            <th>Interesses</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-leads">
                    </tbody>
                </table>
            </div>
        </section>

        <section id="section-produtos" class="content-section" style="display: none;">
            <div class="section-header">
                <h3>Catálogo de Produtos</h3>
                <button class="btn-add">+ Novo Produto</button>
            </div>
            <div class="card table-container">
                <table id="table-produtos">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Categoria</th>
                            <th>Preço Base</th>
                            <th>Prazo (Dias)</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-produtos">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <dialog id="modal-produto" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="modal-title">Novo Produto</h3>
                <button id="close-modal" class="btn-close">&times;</button>
            </header>
            <form id="form-produto">
                <input type="hidden" id="prod-id" name="id">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="prod-nome">Nome do Produto</label>
                        <input type="text" id="prod-nome" name="nome" required>
                    </div>
                    <div class="form-group">
                        <label for="prod-categoria">Categoria</label>
                        <input type="text" id="prod-categoria" name="categoria" required>
                    </div>
                    <div class="form-group">
                        <label for="prod-preco">Preço Base (R$)</label>
                        <input type="number" id="prod-preco" name="precoBase" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="prod-prazo">Prazo Produção (Dias)</label>
                        <input type="number" id="prod-prazo" name="prazoProducaoDias" required>
                    </div>
                </div>
                <div class="form-group mt-2">
                    <label for="prod-descricao">Descrição</label>
                    <textarea id="prod-descricao" name="descricao" rows="3" required></textarea>
                </div>
                <div class="form-group checkbox-group mt-2">
                    <input type="checkbox" id="prod-ativo" name="ativo" checked>
                    <label for="prod-ativo">Produto Ativo no Catálogo</label>
                </div>
                <footer class="modal-footer mt-2">
                    <button type="submit" class="btn-primary w-full">Salvar Produto</button>
                </footer>
            </form>
        </div>
    </dialog>

    <script type="module" src="js/components/DashboardSidebar.js"></script>
    <script type="module" src="js/pages/dashboard.js"></script>
</body>
</html>
